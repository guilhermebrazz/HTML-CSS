<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Fontes</title>
    <style>
        @font-face {
            font-family: 'anyone name';
            src: url(The\ Magic\ Castle.ttf) format('truetype');
            font-weight: normal;
            font-style: normal;
            
            /*
                Tipos de format()
                - opentype (otf)
                - truetype (ttf)  
                - embedded-opentype
                - truetype-aat (Apple Advanced Typography)
                - svg
            */
        }
        h1 {
            font-family: 'anyone name', Times, serif;
        }

    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Vel explicabo soluta aliquid aut quisquam sequi iusto voluptatem ducimus, ad provident alias delectus fugit quia unde labore vitae quas harum beatae.</p>
</body>
</html>
